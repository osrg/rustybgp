name: release-nightly

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Build static binary
        run: |
          docker run --rm -v "$(pwd)":/home/rust/src \
            ghcr.io/rust-cross/rust-musl-cross:${{ matrix.target }} \
            sh -c "apt-get update -q && apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev && cargo build --release"
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/rustybgpd .
          tar czf rustybgp-nightly-linux-${{ matrix.arch }}.tar.gz \
            rustybgpd LICENSE README.md
      - uses: actions/upload-artifact@v4
        with:
          name: rustybgp-nightly-linux-${{ matrix.arch }}
          path: rustybgp-nightly-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          files: rustybgp-nightly-linux-*.tar.gz
