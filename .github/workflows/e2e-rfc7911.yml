name: e2e-rfc7911

on: [pull_request]

jobs:
  e2e-rfc7911:
    name: RFC 7911 end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checking out
        uses: actions/checkout@v6
      - name: Run RFC 7911 e2e test
        working-directory: tests/e2e/rfc7911
        env:
          RUST_TARGET: x86_64-unknown-linux-musl
        run: ./run-test.sh
