name: Dependency Version Check

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly on Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check FRR version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PINNED=$(grep -oP 'ARG FRR_VERSION=\K.*' tests/e2e/rfc8950/Dockerfile.frr)
          # FRR tags are prefixed with "frr-"
          LATEST=$(gh api repos/FRRouting/frr/releases/latest --jq '.tag_name' | sed 's/^frr-//')
          echo "FRR pinned=$PINNED latest=$LATEST"

          if [ "$PINNED" != "$LATEST" ]; then
            TITLE="chore(deps): FRR ${PINNED} → ${LATEST} available"
            EXISTING=$(gh issue list --search "\"${TITLE}\" in:title" --state open --json number --jq 'length')
            if [ "$EXISTING" = "0" ]; then
              gh issue create \
                --title "$TITLE" \
                --body "A newer FRR release is available.

          - **Pinned**: \`${PINNED}\`
          - **Latest**: \`${LATEST}\`
          - **Release**: https://github.com/FRRouting/frr/releases/tag/frr-${LATEST}

          Update \`tests/e2e/rfc8950/Dockerfile.frr\` with the new version and SHA256 hash." \
                --label "dependencies"
              echo "::notice::Opened issue for FRR update"
            else
              echo "Issue already exists for FRR ${LATEST}, skipping"
            fi
          else
            echo "FRR is up to date"
          fi

      - name: Check GoBGP version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PINNED=$(grep -oP 'ARG GOBGP_VERSION=\K.*' tests/e2e/rfc8950/Dockerfile.rustybgp)
          # GoBGP tags are prefixed with "v"
          LATEST=$(gh api repos/osrg/gobgp/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "GoBGP pinned=$PINNED latest=$LATEST"

          if [ "$PINNED" != "$LATEST" ]; then
            TITLE="chore(deps): GoBGP ${PINNED} → ${LATEST} available"
            EXISTING=$(gh issue list --search "\"${TITLE}\" in:title" --state open --json number --jq 'length')
            if [ "$EXISTING" = "0" ]; then
              gh issue create \
                --title "$TITLE" \
                --body "A newer GoBGP release is available.

          - **Pinned**: \`${PINNED}\`
          - **Latest**: \`${LATEST}\`
          - **Release**: https://github.com/osrg/gobgp/releases/tag/v${LATEST}

          Update \`tests/e2e/rfc8950/Dockerfile.rustybgp\` with the new version and SHA256 hashes (both amd64 and arm64)." \
                --label "dependencies"
              echo "::notice::Opened issue for GoBGP update"
            else
              echo "Issue already exists for GoBGP ${LATEST}, skipping"
            fi
          else
            echo "GoBGP is up to date"
          fi
