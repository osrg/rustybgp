name: e2e-rfc8950

on: [pull_request]

jobs:
  e2e-rfc8950:
    name: RFC 8950 end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checking out
        uses: actions/checkout@v6
      - name: Run RFC 8950 e2e test
        working-directory: tests/e2e/rfc8950
        env:
          RUST_TARGET: x86_64-unknown-linux-musl
        run: ./run-test.sh
