name: e2e

on: [pull_request]

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build rustybgpd (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler musl-tools
          rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: build rustybgpd
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rustybgpd-musl
          path: target/x86_64-unknown-linux-musl/release/rustybgpd
          retention-days: 1

  e2e-add-path:
    name: Add-Path (RFC 7911)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rustybgpd-musl
          path: /tmp/rustybgp-prebuilt
      - name: prepare prebuilt context
        run: |
          chmod +x /tmp/rustybgp-prebuilt/rustybgpd
          cp tests/e2e/shared/Dockerfile.rustybgp-prebuilt /tmp/rustybgp-prebuilt/Dockerfile
      - name: Run Add-Path e2e test
        working-directory: tests/e2e/add-path
        env:
          RUSTYBGP_BUILD_CONTEXT: /tmp/rustybgp-prebuilt
          RUSTYBGP_DOCKERFILE: Dockerfile
        run: ./run-test.sh

