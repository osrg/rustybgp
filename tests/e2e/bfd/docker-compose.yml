networks:
  bfd-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.9.0/24
          gateway: 172.30.9.254

services:
  # RustyBGP under test: BGP + BFD enabled for the peer at 172.30.9.2.
  router-rusty:
    build:
      context: ${RUSTYBGP_BUILD_CONTEXT:-../../..}
      dockerfile: ${RUSTYBGP_DOCKERFILE:-tests/e2e/shared/Dockerfile.rustybgp}
      args:
        RUST_TARGET: ${RUST_TARGET:-aarch64-unknown-linux-musl}
    container_name: router-rusty
    privileged: true
    networks:
      bfd-net:
        ipv4_address: 172.30.9.1
    volumes:
      - ./rustybgp.yaml:/etc/rustybgp.yaml:ro
      - ./entrypoint-rusty.sh:/entrypoint.sh:ro

  # Peer container: GoBGP (BGP only) + bfd-stub (BFD only) at same IP.
  # GoBGP has no BFD configured so it stays up when bfd-stub is killed.
  bfd-peer:
    build:
      context: ../../..
      dockerfile: tests/e2e/bfd/stub/Dockerfile
    container_name: bfd-peer
    privileged: true
    networks:
      bfd-net:
        ipv4_address: 172.30.9.2
    volumes:
      - ./gobgp/gobgpd.conf:/etc/gobgpd.conf:ro
      - ./entrypoint-peer.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
