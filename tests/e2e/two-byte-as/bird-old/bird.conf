# bird-old plays the role of an RFC 6793 OLD BGP speaker toward rusty:
# `enable as4 off` means this session never advertises the Four-Octet AS
# Number capability, so AS_PATH/AGGREGATOR go out two-octet-encoded with
# AS_TRANS (23456), paired with AS4_PATH/AS4_AGGREGATOR when a real AS
# number doesn't fit in two octets.
#
# Toward frr-new the session is ordinary (both sides four-octet capable),
# so a route with a wide AS (4200000001) can flow into bird-old's RIB and
# then get relayed toward rusty across the two-octet session.

router id 172.30.41.2;

protocol device {
}

protocol bgp to_rusty {
	local 172.30.41.2 as 65020;
	neighbor 172.30.41.1 as 65010;
	enable as4 off;
	ipv4 {
		import all;
		export all;
	};
}

protocol bgp to_frr_new {
	local 172.30.42.1 as 65020;
	neighbor 172.30.42.2 as 4200000001;
	ipv4 {
		import all;
		export all;
	};
}
