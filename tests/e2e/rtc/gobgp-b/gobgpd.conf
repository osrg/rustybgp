[global.config]
  as = 65004
  router-id = "172.30.6.3"

# vrf-b imports RT:65001:200; GoBGP automatically advertises this RT as RTC NLRI.
[[vrfs]]
  [vrfs.config]
    name = "vrf-b"
    rd = "65004:1"
    import-rt-list = ["65001:200"]
    export-rt-list = ["65001:200"]

[[neighbors]]
  [neighbors.config]
    neighbor-address = "172.30.6.1"
    peer-as = 65001
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "l3vpn-ipv4-unicast"
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "rtc"
