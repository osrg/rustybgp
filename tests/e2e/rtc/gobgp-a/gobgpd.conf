[global.config]
  as = 65003
  router-id = "172.30.6.2"

# vrf-a imports RT:65001:100; GoBGP automatically advertises this RT as RTC NLRI.
[[vrfs]]
  [vrfs.config]
    name = "vrf-a"
    rd = "65003:1"
    import-rt-list = ["65001:100"]
    export-rt-list = ["65001:100"]

[[neighbors]]
  [neighbors.config]
    neighbor-address = "172.30.6.1"
    peer-as = 65001
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "l3vpn-ipv4-unicast"
  [[neighbors.afi-safis]]
    [neighbors.afi-safis.config]
      afi-safi-name = "rtc"
