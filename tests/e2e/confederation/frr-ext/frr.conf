frr defaults traditional
hostname frr-ext
log syslog informational
!
router bgp 65100
 bgp router-id 172.30.21.2
 no bgp ebgp-requires-policy
 no bgp network import-check
 neighbor 172.30.21.1 remote-as 65000
 !
 address-family ipv4 unicast
  neighbor 172.30.21.1 activate
  network 10.0.2.0/24
 exit-address-family
!
ip route 10.0.2.0/24 Null0
!
