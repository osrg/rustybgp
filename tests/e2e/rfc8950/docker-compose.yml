networks:
  client1-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
          gateway: 172.30.1.254

  transit-net:
    driver: bridge
    enable_ipv6: true
    driver_opts:
      com.docker.network.enable_ipv4: "false"
    ipam:
      config:
        - subnet: fd00:1::/64

  client4-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.4.0/24
          gateway: 172.30.4.254

services:
  client1:
    image: alpine:latest
    container_name: client1
    cap_add:
      - NET_ADMIN
    networks:
      client1-net:
        ipv4_address: 172.30.1.10
    command: >
      sh -c "
        ip route del default 2>/dev/null || true;
        ip route add default via 172.30.1.1;
        tail -f /dev/null
      "
    depends_on:
      - router-rusty

  router-rusty:
    build:
      context: ${RUSTYBGP_BUILD_CONTEXT:-../../..}
      dockerfile: ${RUSTYBGP_DOCKERFILE:-tests/e2e/shared/Dockerfile.rustybgp}
      args:
        RUST_TARGET: ${RUST_TARGET:-aarch64-unknown-linux-musl}
    container_name: router-rusty
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      client1-net:
        ipv4_address: 172.30.1.1
      transit-net:
        ipv6_address: fd00:1::2
    volumes:
      - ./rustybgp.yaml:/etc/rustybgp.yaml:ro
      - ./entrypoint-rusty.sh:/entrypoint.sh:ro

  router-frr:
    image: quay.io/frrouting/frr:10.6.0
    container_name: router-frr
    privileged: true
    volumes:
      - ./frr/frr.conf:/etc/frr/frr.conf:ro
      - ../shared/daemons:/etc/frr/daemons:ro
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      transit-net:
        ipv6_address: fd00:1::3
      client4-net:
        ipv4_address: 172.30.4.1

  client4:
    image: alpine:latest
    container_name: client4
    cap_add:
      - NET_ADMIN
    networks:
      client4-net:
        ipv4_address: 172.30.4.10
    command: >
      sh -c "
        ip route del default 2>/dev/null || true;
        ip route add default via 172.30.4.1;
        tail -f /dev/null
      "
    depends_on:
      - router-frr
