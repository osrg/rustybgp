global:
  config:
    as: 65000
    router-id: "172.30.30.1"
  apply-policy:
    config:
      export-policy-list:
        - reject-invalid
      default-export-policy: accept-route

rpki-servers:
  - config:
      address: "172.30.30.10"
      port: 3323

neighbors:
  - config:
      neighbor-address: "172.30.30.2"
      peer-as: 65001
    afi-safis:
      - config:
          afi-safi-name: ipv4-unicast

  - config:
      neighbor-address: "172.30.30.3"
      peer-as: 65002
    afi-safis:
      - config:
          afi-safi-name: ipv4-unicast

policy-definitions:
  - name: reject-invalid
    statements:
      - name: reject
        conditions:
          bgp-conditions:
            rpki-validation-result: invalid
        actions:
          route-disposition: reject-route
