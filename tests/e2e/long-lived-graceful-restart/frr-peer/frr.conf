frr defaults traditional
hostname frr-peer
log syslog informational
!
ip prefix-list PL_NO_LLGR seq 5 permit 192.168.20.0/24
!
route-map EXPORT_TO_RUSTY permit 10
 match ip address prefix-list PL_NO_LLGR
 set community 65535:7
route-map EXPORT_TO_RUSTY permit 20
!
router bgp 65002
 bgp router-id 172.30.5.2
 no bgp ebgp-requires-policy
 no bgp network import-check
 bgp graceful-restart restart-time 10
 bgp long-lived-graceful-restart stale-time 20
 neighbor 172.30.5.1 remote-as 65001
 neighbor 172.30.5.1 graceful-restart
 neighbor 172.30.5.1 long-lived-graceful-restart stale-time 20
 !
 address-family ipv4 unicast
  neighbor 172.30.5.1 activate
  neighbor 172.30.5.1 route-map EXPORT_TO_RUSTY out
  network 192.168.10.0/24
  network 192.168.20.0/24
 exit-address-family
!
