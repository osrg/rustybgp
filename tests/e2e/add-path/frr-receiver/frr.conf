frr defaults traditional
hostname frr-receiver
log syslog informational
!
router bgp 65003
 bgp router-id 172.30.6.2
 no bgp ebgp-requires-policy
 neighbor 172.30.6.1 remote-as 65001
 !
 address-family ipv4 unicast
  neighbor 172.30.6.1 activate
  neighbor 172.30.6.1 addpath-tx-all-paths
 exit-address-family
!
